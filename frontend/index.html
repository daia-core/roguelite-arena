<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Roguelite Arena</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #0a0a0a;
        color: #eee;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #gameCanvas {
        display: block;
        background: #0f0f1e;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        touch-action: none;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #menu-ui {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        z-index: 100;
      }

      .menu-btn {
        padding: 15px 50px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        transition: transform 0.1s;
        min-width: 200px;
      }

      .menu-btn:active {
        transform: scale(0.98);
      }

      #touch-controls {
        position: fixed;
        bottom: 20px;
        right: 15px;
        display: none;
        flex-direction: column;
        gap: 12px;
        z-index: 50;
        padding: 10px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        padding-right: calc(10px + env(safe-area-inset-right, 0px));
      }

      .ability-btn {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-radius: 15px;
        color: white;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(102, 126, 234, 0.6), inset 0 -2px 0 rgba(0,0,0,0.2);
        transition: transform 0.1s, opacity 0.1s, box-shadow 0.3s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }

      .ability-btn:active {
        transform: scale(0.92);
        box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4), inset 0 1px 0 rgba(0,0,0,0.3);
      }

      .ability-btn:disabled {
        opacity: 0.35;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        animation: none;
      }

      .ability-btn:not(:disabled) {
        animation: glow-pulse 2s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%, 100% {
          box-shadow: 0 4px 20px rgba(102, 126, 234, 0.6), inset 0 -2px 0 rgba(0,0,0,0.2);
        }
        50% {
          box-shadow: 0 6px 30px rgba(102, 126, 234, 1), 0 0 20px rgba(102, 126, 234, 0.8), inset 0 -2px 0 rgba(0,0,0,0.2);
        }
      }

      /* Mobile optimizations */
      @media (max-width: 768px) {
        .ability-btn {
          width: 75px;
          height: 75px;
          font-size: 13px;
        }

        #touch-controls {
          bottom: 15px;
          right: 12px;
          gap: 14px;
          padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));
          padding-right: calc(12px + env(safe-area-inset-right, 0px));
        }

        .menu-btn {
          font-size: 18px;
          padding: 18px 40px;
          min-width: 250px;
        }
      }

      @media (max-width: 375px) {
        .ability-btn {
          width: 68px;
          height: 68px;
          font-size: 11px;
        }

        #touch-controls {
          bottom: 12px;
          right: 10px;
          gap: 10px;
          padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
          padding-right: calc(10px + env(safe-area-inset-right, 0px));
        }
      }

      @media (min-height: 800px) {
        .ability-btn {
          width: 80px;
          height: 80px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

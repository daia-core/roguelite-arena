<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Roguelite Arena</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #0a0a0a;
        color: #eee;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #gameCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #0f0f1e;
        touch-action: none;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #menu-ui {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        z-index: 100;
      }

      .menu-btn {
        padding: 15px 50px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        transition: transform 0.1s;
        min-width: 200px;
      }

      .menu-btn:active {
        transform: scale(0.98);
      }

      #joystick-zone {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 160px;
        height: 160px;
        z-index: 50;
        padding-bottom: env(safe-area-inset-bottom, 20px);
        padding-left: env(safe-area-inset-left, 20px);
        pointer-events: none;
      }

      #touch-controls {
        position: fixed;
        bottom: env(safe-area-inset-bottom, 12px);
        right: env(safe-area-inset-right, 12px);
        display: none;
        flex-direction: column;
        gap: 10px;
        z-index: 50;
        pointer-events: none;
      }

      .ability-btn {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: 3px solid rgba(255, 255, 255, 0.5);
        border-radius: 8px;
        color: white;
        font-size: 11px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.7), inset 0 -2px 0 rgba(0,0,0,0.25);
        transition: transform 0.1s, opacity 0.1s, box-shadow 0.3s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        pointer-events: auto;
      }

      .ability-btn:active {
        transform: scale(0.92);
        box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4), inset 0 1px 0 rgba(0,0,0,0.3);
      }

      .ability-btn:disabled {
        opacity: 0.4;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        animation: none;
      }

      .ability-btn:not(:disabled) {
        animation: glow-pulse 2s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%, 100% {
          box-shadow: 0 4px 16px rgba(102, 126, 234, 0.7), inset 0 -2px 0 rgba(0,0,0,0.25);
        }
        50% {
          box-shadow: 0 6px 26px rgba(102, 126, 234, 1), 0 0 18px rgba(102, 126, 234, 0.9), inset 0 -2px 0 rgba(0,0,0,0.25);
        }
      }

      /* Mobile optimizations */
      @media (max-width: 768px) {
        .ability-btn {
          width: 68px;
          height: 68px;
          font-size: 12px;
        }

        #touch-controls {
          bottom: calc(12px + env(safe-area-inset-bottom, 0px));
          right: calc(12px + env(safe-area-inset-right, 0px));
          gap: 12px;
        }

        .menu-btn {
          font-size: 26px;
          padding: 26px 50px;
          min-width: 320px;
        }
      }

      @media (max-width: 375px) {
        .ability-btn {
          width: 62px;
          height: 62px;
          font-size: 11px;
        }

        #touch-controls {
          bottom: calc(10px + env(safe-area-inset-bottom, 0px));
          right: calc(10px + env(safe-area-inset-right, 0px));
          gap: 10px;
        }
      }

      @media (min-height: 800px) {
        .ability-btn {
          width: 72px;
          height: 72px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
